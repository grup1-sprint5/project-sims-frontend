services:
  # Entorno de desarrollo
  web-dev:
    build:
      context: .
      target: development
    container_name: project-sims-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0
    networks:
      - app-network

volumes:
  node_modules:

networks:
  app-network:
    driver: bridge
